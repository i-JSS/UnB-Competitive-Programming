<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .inputQ, select, #botaoCriar, #conteudo{
            width: 100%;
            padding: 1vw;
            border-radius: 1vw;
        }
        .labelQ{
            font-size: 120%;
        }
    </style>
</head>
<body>
<center>
    <h1>
        <a class="anchor"><span>Gerador de MD</span></a>
    </h1>
</center>
<hr>

<label class="labelQ">Nome da Disciplina:</label><br>
<input class="inputQ" type="text" id="nomeD"><br><br>

<label class="labelQ">Nome da Questão:</label><br>
<input class="inputQ" type="text" id="nomeQ"><br><br>

<label class="labelQ">Extensão do Código:</label><br>
<select id="extC">
    <option value="c">C</option>
    <option value="cpp">C++</option>
    <option value="grepe">Grepe</option>
    <option value="regexp">Risc-V | Mips</option>
</select><br><br>

<label class="labelQ" for="conteudo">Código:</label><br>
<textarea id="conteudo" rows="30" cols="50"></textarea><br><br>

<label class="labelQ">Link do PDF para Questão:</label><br>
<input type="file" id="pdfInput" accept="application/pdf" class="inputQ"><br><br>

<button id="botaoCriar">Gerar Arquivo Markdown</button>

<script>
    document.getElementById('botaoCriar').addEventListener('click', function() {
        const nomeDisciplina = document.getElementById('nomeD').value;
        const nomeQuestao = document.getElementById('nomeQ').value;
        const extensaoCodigo = document.getElementById('extC').value;
        const codigo = document.getElementById('conteudo').value;
        const arquivo = document.getElementById('pdfInput').files[0];

        if (arquivo) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const pdfData = event.target.result;
                pdfjsLib.getDocument({ data: pdfData }).promise.then(pdf => {
                    const promessas = [];
                    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                        promessas.push(
                            pdf.getPage(pageNum).then(page => {
                                return page.getTextContent().then(textContent => {
                                    let linhas = textContent.items.map(item => item.str);
                                    if (pageNum === 1) linhas.shift();
                                    linhas.pop();
                                    let textoPagina = linhas.join('\n\n');

                                    textoPagina = textoPagina.replace(/-\s*\n/g, '');
                                    textoPagina = textoPagina.replace(/\s*\n\s*/g, ' ');

                                    textoPagina = textoPagina.replace(/(Exemplo de Entrada) (\d+)/g, '\n\n**$1 $2**\n\n');
                                    textoPagina = textoPagina.replace(/(Exemplo de Saída) (\d+)/g, '\n\n**$1 $2**\n\n');

                                    textoPagina = textoPagina.replace(/(Exemplo de entrada)/g, '\n\n**$1**\n\n');
                                    textoPagina = textoPagina.replace(/(Exemplos exemplo de entrada)/gi, '\n\n**Exemplos de entrada**\n\n');
                                    textoPagina = textoPagina.replace(/(Saída para o exemplo acima)/gi, '\n\n**Exemplo de saída**\n\n');

                                    textoPagina = textoPagina.replace(/(?<!Exemplo de )Entrada/g, '\n\n**Entrada**\n\n');
                                    textoPagina = textoPagina.replace(/(?<!Exemplo de )Saída/g, '\n\n**Saída**\n\n');
                                    textoPagina = textoPagina.replace(/(?<!\n)\bPreâmbulo\b/g, '\n\n**Preâmbulo**\n\n');
                                    textoPagina = textoPagina.replace(/(?<!\n)\bArquivo\b/g, '\n\n**Arquivo**\n\n');

                                    textoPagina = textoPagina.replace(/(?<!\n)\bAutor\b/g, '\n\nAutor');
                                    textoPagina = textoPagina.replace(/(?<!\n)\bAuthor\b/g, '\n\nAutor');

                                    return textoPagina;
                                });
                            })
                        );
                    }
                    Promise.all(promessas).then(textos => {
                        const textoPDF = textos.join('\n\n');
                        const conteudoMarkdown =
`<center>

# ${nomeDisciplina}

</center>

---

# ${nomeQuestao}

<!-- tabs:start -->

#### **Questão**

${textoPDF}

#### **Código**

\`\`\`${extensaoCodigo}
${codigo}
\`\`\`

<!-- tabs:end -->

`;
                        const nome =   nomeQuestao.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\s]/g, '') + (Math.floor(Math.random()*(898))+100) + '.md';
                        const blob = new Blob([conteudoMarkdown], { type: 'text/markdown' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = nome;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);

                        console.log("["+nomeQuestao+"](Questoes/Grepe/"+nome+")");
                    }).catch(error => {
                        console.error('Erro ao extrair texto do PDF:', error);
                    });
                }).catch(error => {
                    console.error('Erro ao carregar o PDF:', error);
                });
            };
            reader.readAsArrayBuffer(arquivo);
        } else {
            console.error('Nenhum arquivo PDF selecionado.');
        }
    });
</script>

</body>
</html>
